apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-dashboard
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-dashboard
  template:
    metadata:
      labels:
        app: devops-dashboard
    spec:
      containers:
        - name: devops-dashboard
          image: xmaseve/devops-dashboard:latest
          ports:
            - containerPort: 8081
          env:
            - name: GITHUB_OWNER
              value: "facebook"
            - name: GITHUB_REPO
              value: "react"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-secret
                  key: token
